<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b4776" />
  <title>Safety Huddle Hospitalar</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">HRDJSN</p>
      <h1>Safety Huddle Hospitalar</h1>
    </div>
    <div class="top-actions">
      <span id="syncStatus" class="sync-pill">Local</span>
      <!--<button id="btnHome" class="ghost icon-home" title="Início">⌂</button>-->
      <button id="btnHome" class="ghost icon-home" title="Início">🏠</button>
      <button id="btnConfig" class="ghost">Configurações</button>
    </div>
  </header>

  <main id="app" class="app-shell"></main>

  <dialog id="modalPendencia" class="modal">
    <form method="dialog" class="modal-card" id="formPendencia">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Nova pendência</p>
          <h2 id="pendenciaTitulo">Cadastrar pendência</h2>
        </div>
        <button type="button" class="icon-btn" id="btnFecharPendencia">×</button>
      </div>

      <label class="field">
        <span>Descrição da pendência</span>
        <textarea id="pendDescricao" rows="4" placeholder="Descreva de forma objetiva o que precisa ser resolvido..." required></textarea>
      </label>

      <div class="quick-row">
        <button type="button" class="chip" data-prazo="24">24 horas</button>
        <button type="button" class="chip" data-prazo="48">48 horas</button>
        <button type="button" class="chip" data-prazo="72">72 horas</button>
        <button type="button" class="chip" data-prazo="0">Sem prazo definido</button>
      </div>

      <label class="field compact">
        <span>Prazo em horas</span>
        <input id="pendPrazoHoras" type="number" min="0" placeholder="Ex.: 24" />
      </label>

      <section class="modal-section">
        <h3>Setores de apoio/execução</h3>
        <div id="pendSetoresApoio" class="check-grid"></div>
      </section>

      <section class="modal-section">
        <h3>Setores para acompanhamento</h3>
        <div id="pendSetoresAcompanhamento" class="check-grid"></div>
      </section>

      <div class="modal-actions">
        <button type="button" class="ghost" id="btnCancelarPendencia">Cancelar</button>
        <button type="submit" class="primary">Salvar pendência</button>
      </div>
    </form>
  </dialog>

  <dialog id="modalStatus" class="modal">
    <form method="dialog" class="modal-card" id="formStatusPendencia">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Atualizar pendência</p>
          <h2>Status por setor</h2>
        </div>
        <button type="button" class="icon-btn" id="btnFecharStatus">×</button>
      </div>
      <p id="statusDescricao" class="muted"></p>
      <div class="quick-row">
        <button type="button" class="chip" id="btnCumprirTodos">Cumprido para todos</button>
        <button type="button" class="chip" id="btnAbrirTodos">Manter aberta para todos</button>
      </div>
      <div id="statusParticipantes" class="status-list"></div>
      <label class="field">
        <span>Observação da atualização</span>
        <textarea id="statusObs" rows="3" placeholder="Ex.: setor informou que ação foi concluída parcialmente..."></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" class="ghost" id="btnCancelarStatus">Cancelar</button>
        <button type="submit" class="primary">Salvar status</button>
      </div>
    </form>
  </dialog>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
